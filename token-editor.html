<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Token Editor v3 — Glossario Claudinho</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=JetBrains+Mono:wght@400;500&family=Outfit:wght@500;600;700&family=Crimson+Pro:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  :root {
    --ed-bg: #111110;
    --ed-bg-panel: #1a1a19;
    --ed-bg-input: #232322;
    --ed-bg-section: #1e1e1d;
    --ed-text: #c8c6be;
    --ed-text-heading: #eae8e1;
    --ed-text-muted: #7a7870;
    --ed-border: #333330;
    --ed-accent: #d97757;
    --ed-accent-hover: #e08a6d;
    --ed-radius: 8px;
    --ed-green: #4caf50;
    --ed-blue: #638cd2;
    --ed-red: #e53935;
  }

  body {
    font-family: 'Inter', -apple-system, sans-serif;
    font-size: 13px;
    color: var(--ed-text);
    background: var(--ed-bg);
    height: 100vh;
    overflow: hidden;
    display: flex;
    -webkit-font-smoothing: antialiased;
  }

  /* ===== PANEL ===== */
  .panel {
    width: 380px;
    min-width: 380px;
    height: 100vh;
    background: var(--ed-bg-panel);
    border-right: 1px solid var(--ed-border);
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }

  .panel-header {
    padding: 16px 20px 12px;
    border-bottom: 1px solid var(--ed-border);
    flex-shrink: 0;
  }

  .panel-title {
    font-family: 'Outfit', sans-serif;
    font-size: 14px;
    font-weight: 700;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    color: var(--ed-text-heading);
    margin-bottom: 2px;
  }

  .panel-subtitle { font-size: 12px; color: var(--ed-text-muted); }

  /* ===== TOOLBAR ===== */
  .toolbar {
    display: flex;
    gap: 5px;
    padding: 10px 20px;
    border-bottom: 1px solid var(--ed-border);
    flex-shrink: 0;
    flex-wrap: wrap;
    align-items: center;
  }

  .tool-btn {
    font-family: 'Inter', sans-serif;
    font-size: 11px;
    font-weight: 500;
    padding: 5px 10px;
    border-radius: 100px;
    border: 1px solid var(--ed-border);
    background: transparent;
    color: var(--ed-text-muted);
    cursor: pointer;
    transition: all 0.15s;
    white-space: nowrap;
    display: inline-flex;
    align-items: center;
    gap: 4px;
  }

  .tool-btn:hover { border-color: var(--ed-text); color: var(--ed-text-heading); }
  .tool-btn:disabled { opacity: 0.3; cursor: not-allowed; }
  .tool-btn:disabled:hover { border-color: var(--ed-border); color: var(--ed-text-muted); }
  .tool-btn.active { background: var(--ed-accent); color: white; border-color: var(--ed-accent); }
  .tool-btn.primary { background: var(--ed-accent); color: white; border-color: var(--ed-accent); }
  .tool-btn.primary:hover { background: var(--ed-accent-hover); border-color: var(--ed-accent-hover); }
  .tool-btn.ghost { border-color: transparent; }
  .tool-btn.ghost:hover { border-color: var(--ed-border); }
  .tool-btn.wire-active { background: var(--ed-blue); color: white; border-color: var(--ed-blue); }
  .tool-btn.save-btn { background: var(--ed-green); color: white; border-color: var(--ed-green); font-weight: 600; }
  .tool-btn.save-btn:hover { background: #66bb6a; border-color: #66bb6a; }
  .tool-btn.lang-btn { font-size: 10px; font-weight: 600; letter-spacing: 0.05em; text-transform: uppercase; padding: 4px 8px; }
  .tool-sep { width: 1px; height: 18px; background: var(--ed-border); margin: 0 2px; flex-shrink: 0; }
  .tool-spacer { flex: 1; }

  /* ===== TABS ===== */
  .tabs { display: flex; border-bottom: 1px solid var(--ed-border); flex-shrink: 0; }

  .tab {
    flex: 1;
    padding: 9px 8px;
    font-family: 'Inter', sans-serif;
    font-size: 10.5px;
    font-weight: 600;
    letter-spacing: 0.04em;
    text-transform: uppercase;
    color: var(--ed-text-muted);
    background: transparent;
    border: none;
    border-bottom: 2px solid transparent;
    cursor: pointer;
    transition: all 0.15s;
    text-align: center;
  }

  .tab:hover { color: var(--ed-text); }
  .tab.active { color: var(--ed-accent); border-bottom-color: var(--ed-accent); }

  /* ===== SCROLL AREA ===== */
  .panel-body { flex: 1; overflow-y: auto; padding: 16px 20px 80px; }
  .panel-body::-webkit-scrollbar { width: 4px; }
  .panel-body::-webkit-scrollbar-track { background: transparent; }
  .panel-body::-webkit-scrollbar-thumb { background: var(--ed-border); border-radius: 4px; }

  /* ===== SECTIONS ===== */
  .section { margin-bottom: 24px; }

  .section-title {
    font-family: 'Outfit', sans-serif;
    font-size: 11px;
    font-weight: 600;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: var(--ed-text-muted);
    margin-bottom: 12px;
    padding-bottom: 8px;
    border-bottom: 1px solid var(--ed-border);
  }

  /* ===== COLLAPSIBLE SECTIONS ===== */
  .comp-header {
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 10px 0;
    cursor: pointer;
    border-bottom: 1px solid var(--ed-border);
    margin-bottom: 8px;
    user-select: none;
  }
  .comp-header:hover .comp-header-name { color: var(--ed-text-heading); }
  .comp-header-icon { width: 16px; height: 16px; color: var(--ed-text-muted); flex-shrink: 0; }
  .comp-header-name {
    font-family: 'Outfit', sans-serif;
    font-size: 12px;
    font-weight: 600;
    color: var(--ed-text);
    flex: 1;
    transition: color 0.15s;
  }
  .comp-header-chevron {
    width: 14px; height: 14px;
    color: var(--ed-text-muted);
    transition: transform 0.2s;
    flex-shrink: 0;
  }
  .comp-header.collapsed .comp-header-chevron { transform: rotate(-90deg); }
  .comp-body { margin-bottom: 16px; }
  .comp-body.hidden { display: none; }

  /* ===== TOKEN ROW ===== */
  .token-row {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 7px 0;
    border-bottom: 1px solid rgba(51,51,48,0.4);
  }

  .token-row:last-child { border-bottom: none; }

  .token-label {
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px;
    color: var(--ed-text-muted);
    min-width: 110px;
    flex-shrink: 0;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
  }

  .token-label:hover { color: var(--ed-text); }

  .color-input-wrap { display: flex; align-items: center; gap: 8px; flex: 1; }

  .color-swatch {
    width: 28px; height: 28px; border-radius: 6px;
    border: 1px solid var(--ed-border); cursor: pointer;
    flex-shrink: 0; position: relative; overflow: hidden;
  }

  .color-swatch input[type="color"] {
    position: absolute; top: -4px; left: -4px;
    width: 40px; height: 40px; border: none; cursor: pointer; opacity: 0;
  }

  .color-hex {
    font-family: 'JetBrains Mono', monospace; font-size: 11px;
    color: var(--ed-text); background: var(--ed-bg-input);
    border: 1px solid var(--ed-border); border-radius: 6px;
    padding: 6px 8px; width: 86px; outline: none; transition: border-color 0.15s;
  }
  .color-hex:focus { border-color: var(--ed-accent); }

  .token-input {
    font-family: 'JetBrains Mono', monospace; font-size: 11px;
    color: var(--ed-text); background: var(--ed-bg-input);
    border: 1px solid var(--ed-border); border-radius: 6px;
    padding: 6px 8px; width: 100%; max-width: 160px; outline: none;
  }
  .token-input:focus { border-color: var(--ed-accent); }

  .token-select {
    font-family: 'Inter', sans-serif; font-size: 11px;
    color: var(--ed-text); background: var(--ed-bg-input);
    border: 1px solid var(--ed-border); border-radius: 6px;
    padding: 6px 8px; width: 100%; max-width: 200px; outline: none; cursor: pointer;
  }
  .token-select:focus { border-color: var(--ed-accent); }

  .token-slider-wrap { display: flex; align-items: center; gap: 8px; flex: 1; }

  .token-slider {
    flex: 1; height: 4px; -webkit-appearance: none; appearance: none;
    background: var(--ed-border); border-radius: 4px; outline: none;
  }
  .token-slider::-webkit-slider-thumb {
    -webkit-appearance: none; width: 14px; height: 14px;
    border-radius: 50%; background: var(--ed-accent); cursor: pointer;
  }

  .token-slider-val {
    font-family: 'JetBrains Mono', monospace; font-size: 11px;
    color: var(--ed-text-muted); min-width: 42px; text-align: right;
  }

  /* ===== TOGGLE SWITCH ===== */
  .toggle-wrap { display: flex; align-items: center; gap: 8px; }
  .toggle-switch {
    width: 36px; height: 20px; border-radius: 10px;
    background: var(--ed-border); cursor: pointer; position: relative;
    transition: background 0.2s; border: none;
  }
  .toggle-switch::after {
    content: ''; position: absolute; top: 2px; left: 2px;
    width: 16px; height: 16px; border-radius: 50%;
    background: var(--ed-text-muted); transition: all 0.2s;
  }
  .toggle-switch.on { background: var(--ed-green); }
  .toggle-switch.on::after { left: 18px; background: white; }

  /* ===== DISCRETE RADIUS OPTIONS ===== */
  .radius-options { display: flex; gap: 4px; flex: 1; }
  .radius-opt {
    font-family: 'Inter', sans-serif; font-size: 10px; font-weight: 500;
    padding: 4px 8px; border-radius: 4px; border: 1px solid var(--ed-border);
    background: transparent; color: var(--ed-text-muted); cursor: pointer;
    transition: all 0.15s;
  }
  .radius-opt:hover { border-color: var(--ed-text); color: var(--ed-text); }
  .radius-opt.active { background: var(--ed-accent); color: white; border-color: var(--ed-accent); }

  /* ===== THEME CARDS ===== */
  .theme-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-bottom: 16px; }
  .theme-card {
    background: var(--ed-bg-input); border: 1px solid var(--ed-border);
    border-radius: 8px; padding: 10px 12px; cursor: pointer;
    transition: border-color 0.15s, transform 0.15s;
  }
  .theme-card:hover { border-color: var(--ed-accent); transform: translateY(-1px); }
  .theme-card.active-theme { border-color: var(--ed-accent); box-shadow: 0 0 0 1px var(--ed-accent); }
  .theme-card-name {
    font-family: 'Inter', sans-serif; font-size: 11px; font-weight: 600;
    color: var(--ed-text-heading); margin-bottom: 2px;
  }
  .theme-card-desc { font-size: 9px; color: var(--ed-text-muted); margin-bottom: 6px; line-height: 1.3; }
  .theme-swatches { display: flex; gap: 3px; }
  .theme-swatch {
    width: 18px; height: 18px; border-radius: 50%;
    border: 1px solid rgba(255,255,255,0.1);
  }

  /* ===== NOTES / REFERENCES ===== */
  .notes-textarea {
    width: 100%; min-height: 80px; max-height: 200px;
    font-family: 'Inter', sans-serif; font-size: 12px;
    color: var(--ed-text); background: var(--ed-bg-input);
    border: 1px solid var(--ed-border); border-radius: 8px;
    padding: 10px 12px; outline: none; resize: vertical; line-height: 1.5;
  }
  .notes-textarea:focus { border-color: var(--ed-accent); }
  .notes-textarea::placeholder { color: var(--ed-text-muted); }
  .notes-actions { display: flex; gap: 6px; margin-top: 8px; flex-wrap: wrap; }

  .attachment-card {
    display: flex; align-items: center; gap: 10px;
    background: var(--ed-bg-input); border: 1px solid var(--ed-border);
    border-radius: 8px; padding: 8px 12px; margin-bottom: 6px;
  }
  .attachment-card img { width: 48px; height: 48px; object-fit: cover; border-radius: 4px; flex-shrink: 0; }
  .attachment-card .att-info { flex: 1; min-width: 0; }
  .attachment-card .att-name {
    font-size: 11px; color: var(--ed-text); font-weight: 500;
    overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
  }
  .attachment-card .att-type { font-size: 9px; color: var(--ed-text-muted); text-transform: uppercase; letter-spacing: 0.05em; }
  .attachment-card .att-delete {
    width: 20px; height: 20px; border-radius: 50%; border: none;
    background: transparent; color: var(--ed-text-muted); cursor: pointer;
    font-size: 14px; display: flex; align-items: center; justify-content: center;
  }
  .attachment-card .att-delete:hover { color: var(--ed-red); background: rgba(229,57,53,0.1); }
  .attachment-card iframe { width: 100%; height: 120px; border: none; border-radius: 4px; }
  .att-link { color: var(--ed-blue); text-decoration: none; font-size: 10px; }
  .att-link:hover { text-decoration: underline; }

  /* ===== SEMANTIC COLOR PICKER ===== */
  .sem-color-wrap { display: flex; align-items: center; gap: 6px; flex: 1; }
  .sem-color-select { max-width: 130px; }
  .sem-color-swatch {
    width: 22px; height: 22px; border-radius: 4px;
    border: 1px solid var(--ed-border); flex-shrink: 0;
  }

  /* ===== PREVIEW AREA ===== */
  .preview {
    flex: 1; height: 100vh; display: flex; flex-direction: column; background: var(--ed-bg);
  }

  .preview-toolbar {
    display: flex; align-items: center; gap: 8px;
    padding: 8px 16px; background: var(--ed-bg-panel);
    border-bottom: 1px solid var(--ed-border); flex-shrink: 0;
  }

  .preview-size-label {
    font-family: 'JetBrains Mono', monospace; font-size: 10px;
    color: var(--ed-text-muted); min-width: 70px;
  }

  .preview-frame-wrap {
    flex: 1; display: flex; justify-content: center; align-items: flex-start;
    overflow: auto; background: var(--ed-bg); padding: 0;
  }

  .preview-frame-wrap.mobile-mode { padding: 24px; background: #0a0a09; }

  .preview-frame { border: none; background: white; width: 100%; height: 100%; }

  .preview-frame-wrap.mobile-mode .preview-frame {
    width: 390px; height: calc(100vh - 60px);
    border-radius: 16px;
    box-shadow: 0 0 0 2px var(--ed-border), 0 8px 32px rgba(0,0,0,0.4);
  }

  /* ===== STATUS BAR ===== */
  .status-bar {
    position: fixed; bottom: 0; left: 0; width: 380px;
    padding: 7px 20px; background: var(--ed-bg-section);
    border-top: 1px solid var(--ed-border);
    font-size: 11px; color: var(--ed-text-muted);
    display: flex; justify-content: space-between; align-items: center; z-index: 5;
  }

  /* ===== TOAST ===== */
  .snapshot-toast {
    position: fixed; top: 20px; right: 20px; z-index: 9999;
    background: var(--ed-green); color: white;
    font-family: 'Inter', sans-serif; font-size: 12px; font-weight: 500;
    padding: 10px 16px; border-radius: 8px;
    opacity: 0; transform: translateY(-10px);
    transition: all 0.3s ease; pointer-events: none;
  }
  .snapshot-toast.show { opacity: 1; transform: translateY(0); }
  .snapshot-toast.error { background: var(--ed-red); }

  /* ===== CHANGES BADGE ===== */
  .changes-badge {
    display: inline-flex; align-items: center; justify-content: center;
    min-width: 16px; height: 16px; border-radius: 100px;
    background: white; color: var(--ed-green);
    font-size: 9px; font-weight: 700; padding: 0 4px;
  }
  .changes-badge.hidden { display: none; }

  .undo-count {
    font-size: 9px; font-weight: 600; color: var(--ed-accent);
    margin-left: 2px;
  }

  @keyframes pulse {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.3; }
  }

  /* ===== RESPONSIVE ===== */
  @media (max-width: 860px) {
    body { flex-direction: column; }
    .panel { width: 100%; min-width: auto; height: 50vh; }
    .preview { height: 50vh; }
    .status-bar { width: 100%; }
  }
</style>
</head>
<body>

<!-- TOAST -->
<div class="snapshot-toast" id="toast"></div>

<!-- ===== EDITOR PANEL ===== -->
<div class="panel">
  <div class="panel-header">
    <div class="panel-title" id="panelTitle">Token Editor</div>
    <div class="panel-subtitle" id="panelSubtitle">Glossario Claudinho — Design System</div>
  </div>

  <!-- TOOLBAR ROW 1 -->
  <div class="toolbar">
    <button class="tool-btn active" id="btnLight" onclick="setTheme('light')">Light</button>
    <button class="tool-btn" id="btnDark" onclick="setTheme('dark')">Dark</button>
    <div class="tool-sep"></div>
    <button class="tool-btn" id="btnUndo" onclick="undo()" disabled>
      <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 10h10a5 5 0 0 1 0 10H9"/><path d="m3 10 4-4"/><path d="m3 10 4 4"/></svg>
      <span id="undoLabel">Desfazer</span> <span class="undo-count" id="undoCount"></span>
    </button>
    <button class="tool-btn lang-btn" id="btnLang" onclick="toggleLang()">PT</button>
    <div class="tool-spacer"></div>
    <button class="tool-btn ghost" id="btnReset" onclick="resetAll()">Reset</button>
    <button class="tool-btn ghost" id="btnOverview" onclick="window.open('token-overview.html','_blank')">
      <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/></svg>
      <span id="overviewLabel">Sistema</span>
    </button>
    <button class="tool-btn save-btn" id="btnSave" onclick="saveTokens()">
      <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M19 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11l5 5v11a2 2 0 0 1-2 2z"/><polyline points="17,21 17,13 7,13 7,21"/><polyline points="7,3 7,8 15,8"/></svg>
      <span id="saveLabel">Salvar</span>
      <span class="changes-badge hidden" id="changesBadge">0</span>
    </button>
  </div>

  <!-- TOOLBAR ROW 2 -->
  <div class="toolbar" style="padding-top:0; border-bottom:none;">
    <button class="tool-btn" id="btnDesktop" onclick="setViewport('desktop')" style="border-color:var(--ed-accent);color:var(--ed-accent)">
      <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="2" y="3" width="20" height="14" rx="2"/><path d="M8 21h8m-4-4v4"/></svg>
      Desktop
    </button>
    <button class="tool-btn" id="btnMobile" onclick="setViewport('mobile')">
      <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="5" y="2" width="14" height="20" rx="2"/><path d="M12 18h.01"/></svg>
      Mobile
    </button>
    <div class="tool-sep"></div>
    <button class="tool-btn" id="btnWireframe" onclick="toggleWireframe()">
      <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="18" height="18" rx="2"/><path d="M3 9h18M9 21V9"/></svg>
      Wireframe
    </button>
    <button class="tool-btn" onclick="takeSnapshot()">
      <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M23 19a2 2 0 0 1-2 2H3a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h4l2-3h6l2 3h4a2 2 0 0 1 2 2z"/><circle cx="12" cy="13" r="4"/></svg>
      Print
    </button>
  </div>

  <div class="tabs" id="tabBar"></div>

  <div class="panel-body" id="panelBody"></div>

  <div class="status-bar" id="statusBar">
    <span id="statusText">Nenhuma alteracao</span>
    <span id="statusTheme">light · desktop</span>
  </div>
</div>

<!-- ===== PREVIEW ===== -->
<div class="preview">
  <div class="preview-toolbar">
    <select class="token-select" id="pageSelect" onchange="changePage()" style="max-width:none;flex:1;font-size:12px">
      <option value="index.html">Home</option>
      <option value="pages/basicos.html">Basicos</option>
      <option value="pages/cursos.html">Cursos</option>
      <option value="pages/ferramentas.html">Ferramentas</option>
      <option value="pages/desenvolvimento.html">Desenvolvimento</option>
      <option value="pages/arquivos.html">Arquivos</option>
      <option value="pages/comandos.html">Comandos</option>
      <option value="pages/dashboard.html">Dashboard</option>
    </select>
    <span class="preview-size-label" id="sizeLabel">100%</span>
    <button class="tool-btn" onclick="refreshPreview()">Refresh</button>
  </div>
  <div class="preview-frame-wrap" id="frameWrap">
    <iframe id="previewFrame" class="preview-frame" src="index.html"></iframe>
  </div>
</div>

<script>
// ===================================================================
// i18n
// ===================================================================
const LANG = {
  pt: {
    panelTitle: 'Token Editor',
    panelSubtitle: 'Glossario Claudinho — Design System',
    tabTemas: 'Temas',
    tabCores: 'Cores',
    tabTipo: 'Tipo',
    tabComponentes: 'Componentes',
    tabReferencias: 'Referências',
    undo: 'Desfazer',
    reset: 'Reset',
    overview: 'Sistema',
    save: 'Salvar',
    noChanges: 'Nenhuma alteração',
    tokensChanged: (n) => `${n} token${n>1?'s':''} alterado${n>1?'s':''}`,
    saveSuccess: 'Tokens salvos em styles.css',
    saveError: 'Erro ao salvar',
    snapshotCopied: 'Snapshot copiado para clipboard',
    notesCopied: 'Notas + alterações copiadas',
    copyNotes: 'Copiar notas',
    clearNotes: 'Limpar',
    notesPlaceholder: 'Ex: Aumentar contraste do texto body... Trocar accent para azul...',
    notesTitle: 'Bloco de notas',
    notesDesc: 'Anote aqui os ajustes que quer pedir ao Claude. Depois copie e cole na conversa do terminal.',
    changesTitle: 'Alterações feitas',
    noChangesYet: 'Nenhuma alteração ainda.',
    attachTitle: 'Referências visuais',
    addImage: '+ Imagem',

function hsl(h, s, l) {
  s = Math.max(0, Math.min(100, s));
  l = Math.max(0, Math.min(100, l));
  const a = s * Math.min(l, 100-l) / 100 / 100;
  const f = n => {
    const k = (n + h/30) % 12;
    const color = l/100 - a * Math.max(Math.min(k-3, 9-k, 1), -1);
    return Math.round(255 * Math.max(0, Math.min(1, color))).toString(16).padStart(2,'0');
  };
  return `#${f(0)}${f(8)}${f(4)}`;
}

function generateThemeFromHue(hue, name, desc) {
  return {
    name: name || `Tema ${Math.round(hue)}°`,
    description: desc || `Gerado a partir de matiz ${Math.round(hue)}°`,
    light: {
      '--bg': hsl(hue, 5, 97), '--bg-sidebar': hsl(hue, 5, 95), '--bg-card': '#ffffff',
      '--bg-code': hsl(hue, 5, 93), '--bg-callout': `rgba(${parseInt(hsl(hue,55,55).slice(1,3),16)},${parseInt(hsl(hue,55,55).slice(3,5),16)},${parseInt(hsl(hue,55,55).slice(5,7),16)},0.07)`,
      '--text': hsl(hue, 5, 22), '--text-heading': hsl(hue, 5, 10), '--text-muted': hsl(hue, 4, 58),
      '--border': hsl(hue, 5, 90), '--accent': hsl(hue, 55, 55), '--accent-hover': hsl(hue, 55, 45),
      '--btn-dark-bg': hsl(hue, 5, 10), '--btn-dark-text': hsl(hue, 5, 97),
      '--tag-essential-bg': hsl(hue, 5, 10), '--tag-essential-text': hsl(hue, 5, 97),
    },
    dark: {
      '--bg': hsl(hue, 5, 10), '--bg-sidebar': hsl(hue, 5, 8), '--bg-card': hsl(hue, 5, 14),
      '--bg-code': hsl(hue, 5, 17), '--bg-callout': `rgba(${parseInt(hsl(hue,55,60).slice(1,3),16)},${parseInt(hsl(hue,55,60).slice(3,5),16)},${parseInt(hsl(hue,55,60).slice(5,7),16)},0.12)`,
      '--text': hsl(hue, 4, 78), '--text-heading': hsl(hue, 4, 90), '--text-muted': hsl(hue, 4, 47),
      '--border': hsl(hue, 4, 20), '--accent': hsl(hue, 50, 65), '--accent-hover': hsl(hue, 55, 55),
      '--btn-dark-bg': hsl(hue, 4, 90), '--btn-dark-text': hsl(hue, 5, 10),
      '--tag-essential-bg': hsl(hue, 4, 90), '--tag-essential-text': hsl(hue, 5, 10),
    }
  };
}

// ===================================================================
// STATE
// ===================================================================
let currentTheme = 'light';
let currentTab = 'temas';
let currentViewport = 'desktop';
let wireframeOn = false;
let changes = {};
let undoStack = [];
let notes = localStorage.getItem('tokenEditorNotes') || '';
let attachments = JSON.parse(localStorage.getItem('editorAttachments') || '[]');
let sectionStates = JSON.parse(localStorage.getItem('editorSections') || '{}');
let previewingTheme = null;
let activePresetIndex = -1;
const TAB_NAMES = ['temas','cores','tipografia','espacamento','componentes','referencias'];

// ===================================================================
// UNDO SYSTEM
// ===================================================================
function pushUndo() {
  if (previewingTheme) return;
  undoStack.push(JSON.parse(JSON.stringify(changes)));
  if (undoStack.length > 10) undoStack.shift();
  updateUndoBtn();
}
function undo() {
  if (undoStack.length === 0) return;
  changes = undoStack.pop();
  reapplyAll();
  updateStatus();
  updateUndoBtn();
  renderPanel();
}
function updateUndoBtn() {
  const btn = document.getElementById('btnUndo');
  const count = document.getElementById('undoCount');
  btn.disabled = undoStack.length === 0;
  count.textContent = undoStack.length > 0 ? undoStack.length : '';
}
document.addEventListener('keydown', (e) => {
  if ((e.metaKey || e.ctrlKey) && e.key === 'z') { e.preventDefault(); undo(); }
});

// ===================================================================
// TABS
// ===================================================================
function renderTabs() {
  const labels = [t('tabTemas'), t('tabCores'), t('tabTipo'), 'Layout', t('tabComponentes'), t('tabReferencias')];
  document.getElementById('tabBar').innerHTML = TAB_NAMES.map((name, i) =>
    `<button class="tab ${name === currentTab ? 'active' : ''}" onclick="switchTab('${name}')">${labels[i]}</button>`
  ).join('');
}
function switchTab(tab) {
  currentTab = tab;
  renderTabs();
  renderPanel();
}

// ===================================================================
// RENDER PANEL
// ===================================================================
function renderPanel() {
  const body = document.getElementById('panelBody');
  if (currentTab === 'temas') { renderTemasTab(body); return; }
  if (currentTab === 'referencias') { renderReferenciasTab(body); return; }

  let html = '';

  if (currentTab === 'cores') {
    const themeTokens = TOKENS.cores[currentTheme];
    for (const [groupKey, tokens] of Object.entries(themeTokens)) {
      const groupLabel = t(groupKey) || groupKey;
      html += `<div class="section"><div class="section-title">${groupLabel}</div>`;
      for (const [varName, def] of Object.entries(tokens)) {
        const val = changes[varName] || def.value;
        const changed = changes[varName] && changes[varName] !== def.value;
        html += renderColorRow(varName, def, val, changed);
      }
      html += '</div>';
    }
  } else if (currentTab === 'componentes') {
    for (const [group, tokens] of Object.entries(TOKENS.componentes)) {
      const collapsed = sectionStates[group] === true;
      const iconPath = tokens._icon || '';
      html += `<div class="section" style="margin-bottom:8px">`;
      html += `<div class="comp-header ${collapsed ? 'collapsed' : ''}" onclick="toggleSection('${group}')">`;
      html += `<svg class="comp-header-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="${iconPath}"/></svg>`;
      html += `<span class="comp-header-name">${group}</span>`;
      html += `<svg class="comp-header-chevron" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="m6 9 6 6 6-6"/></svg>`;
      html += `</div>`;
      html += `<div class="comp-body ${collapsed ? 'hidden' : ''}">`;
      for (const [varName, def] of Object.entries(tokens)) {
        if (varName.startsWith('_')) continue;
        html += renderTokenRow(varName, def);
      }
      html += '</div></div>';
    }
  } else {
    // tipografia or espacamento
    const sectionTokens = TOKENS[currentTab];
    if (!sectionTokens) { body.innerHTML = ''; return; }
    for (const [group, tokens] of Object.entries(sectionTokens)) {
      html += `<div class="section"><div class="section-title">${group}</div>`;
      for (const [varName, def] of Object.entries(tokens)) {
        html += renderTokenRow(varName, def);
      }
      html += '</div>';
    }
  }

  body.innerHTML = html;
}

function renderColorRow(varName, def, val, changed) {
  return `
    <div class="token-row">
      <span class="token-label" title="${varName}" style="${changed?'color:var(--ed-accent)':''}">${def.label}</span>
      <div class="color-input-wrap">
        <div class="color-swatch" style="background:${val}">
          <input type="color" value="${toHex6(val)}" onchange="updateColor('${varName}','${def.value}',this.value)">
        </div>
        <input class="color-hex" value="${val}" onchange="updateColor('${varName}','${def.value}',this.value)" spellcheck="false">
      </div>
    </div>`;
}

function renderTokenRow(varName, def) {
  const val = changes[varName] !== undefined ? changes[varName] : def.value;
  const changed = changes[varName] !== undefined && changes[varName] != def.value;
  const style = changed ? 'color:var(--ed-accent)' : '';
  const labelKey = def.label;
  const label = LANG[currentLang][labelKey] || labelKey;

  if (def.type === 'slider') {
    const step = def.step || 1;
    const unit = def.unit || 'px';
    return `
      <div class="token-row">
        <span class="token-label" title="${varName}" style="${style}">${label}</span>
        <div class="token-slider-wrap">
          <input type="range" class="token-slider" min="${def.min}" max="${def.max}" step="${step}" value="${val}"
            oninput="updateProp('${varName}','${def.value}',this.value,this)">
          <span class="token-slider-val">${val}${unit}</span>
        </div>
      </div>`;
  } else if (def.type === 'select') {
    return `
      <div class="token-row">
        <span class="token-label" title="${varName}" style="${style}">${label}</span>
        <select class="token-select" onchange="updateProp('${varName}','${def.value}',this.value)">
          ${def.options.map(o => `<option value="${o}" ${o==val?'selected':''}>${o}</option>`).join('')}
        </select>
      </div>`;
  } else if (def.type === 'font') {
    return `
      <div class="token-row">
        <span class="token-label" title="${varName}" style="${style}">${label}</span>
        <select class="token-select" onchange="updateProp('${varName}','${def.value}',this.value)">
          ${FONT_OPTIONS.map(o => `<option value="${o.value}" ${o.value===val?'selected':''}>${o.label}</option>`).join('')}
        </select>
      </div>`;
  } else if (def.type === 'color-semantic') {
    const isSemantic = val.startsWith('var(');
    const options = SEMANTIC_COLORS.map(c =>
      `<option value="${c.value}" ${c.value===val?'selected':''}>${c.label}</option>`
    ).join('') + `<option value="__custom" ${!isSemantic?'selected':''}>${t('personalizado')}</option>`;
    let row = `
      <div class="token-row">
        <span class="token-label" title="${varName}" style="${style}">${label}</span>
        <div class="sem-color-wrap">
          <select class="token-select sem-color-select" onchange="updateSemColor('${varName}','${def.value}',this.value)">
            ${options}
          </select>`;
    if (!isSemantic) {
      row += `<div class="color-swatch" style="background:${val};width:22px;height:22px">
        <input type="color" value="${toHex6(val)}" onchange="updateProp('${varName}','${def.value}',this.value)" style="width:30px;height:30px">
      </div>`;
    }
    row += `</div></div>`;
    return row;
  } else if (def.type === 'toggle') {
    const isOn = val === 'true' || val === true;
    return `
      <div class="token-row">
        <span class="token-label" title="${varName}" style="${style}">${label}</span>
        <div class="toggle-wrap">
          <button class="toggle-switch ${isOn ? 'on' : ''}" onclick="updateToggle('${varName}','${def.value}')"></button>
        </div>
      </div>`;
  } else if (def.type === 'radius') {
    const opts = [
      { label: 'None', v: '0' }, { label: 'S', v: '4' }, { label: 'M', v: '8' },
      { label: 'L', v: '12' }, { label: 'Full', v: '100' }
    ];
    return `
      <div class="token-row">
        <span class="token-label" title="${varName}" style="${style}">${label}</span>
        <div class="radius-options">
          ${opts.map(o => `<button class="radius-opt ${o.v==val?'active':''}" onclick="updateProp('${varName}','${def.value}','${o.v}');renderPanel()">${o.label}</button>`).join('')}
        </div>
      </div>`;
  }
  return '';
}

// ===================================================================
// TEMAS TAB
// ===================================================================
function renderTemasTab(body) {
  let html = `
    <div class="section">
      <div class="section-title">${t('themesTitle')}</div>
      <p style="font-size:11px;color:var(--ed-text-muted);margin-bottom:12px;line-height:1.5">${t('themesDesc')}</p>
      <div class="theme-grid">`;

  THEME_PRESETS.forEach((preset, i) => {
    const colors = currentTheme === 'dark' ? preset.dark : preset.light;
    const isActive = activePresetIndex === i;
    html += `
      <div class="theme-card ${isActive ? 'active-theme' : ''}"
        onmouseenter="previewThemePreset(${i})"
        onmouseleave="unpreviewTheme()"
        onclick="applyThemePreset(${i})">
        <div class="theme-card-name">${preset.name}</div>
        <div class="theme-card-desc">${preset.description}</div>
        <div class="theme-swatches">
          <span class="theme-swatch" style="background:${colors['--bg']}"></span>
          <span class="theme-swatch" style="background:${colors['--text']}"></span>
          <span class="theme-swatch" style="background:${colors['--accent']}"></span>
          <span class="theme-swatch" style="background:${colors['--text-muted']}"></span>
          <span class="theme-swatch" style="background:${colors['--border']}"></span>
        </div>
      </div>`;
  });

  html += `</div>
    <button class="tool-btn" onclick="generateMoreThemes()" style="width:100%;justify-content:center">
      ${t('generateThemes')}
    </button>
  </div>`;

  body.innerHTML = html;
}

function previewThemePreset(index) {
  previewingTheme = index;
  const preset = THEME_PRESETS[index];
  const colors = currentTheme === 'dark' ? preset.dark : preset.light;
  const doc = getFrameDoc();
  if (!doc) return;
  for (const [k, v] of Object.entries(colors)) {
    doc.documentElement.style.setProperty(k, v);
  }
}

function unpreviewTheme() {
  if (previewingTheme === null) return;
  previewingTheme = null;
  reapplyAll();
}

function applyThemePreset(index) {
  pushUndo();
  const preset = THEME_PRESETS[index];
  const colors = currentTheme === 'dark' ? preset.dark : preset.light;
  for (const [k, v] of Object.entries(colors)) {
    changes[k] = v;
  }
  activePresetIndex = index;
  reapplyAll();
  updateStatus();
  renderPanel();
}

function generateMoreThemes() {
  for (let i = 0; i < 3; i++) {
    const hue = Math.round(Math.random() * 360);
    THEME_PRESETS.push(generateThemeFromHue(hue));
  }
  renderPanel();
}

// ===================================================================
// ATTACHMENTS
// ===================================================================
function addImageAttachment() {
  const input = document.createElement('input');
  input.type = 'file';
  input.accept = 'image/*';
  input.onchange = (e) => {
    const file = e.target.files[0];
    if (!file) return;
    const reader = new FileReader();
    reader.onload = (ev) => {
      // Resize via canvas
      const img = new Image();
      img.onload = () => {
        const canvas = document.createElement('canvas');
        const maxW = 400;
        const scale = img.width > maxW ? maxW / img.width : 1;
        canvas.width = img.width * scale;
        canvas.height = img.height * scale;
        canvas.getContext('2d').drawImage(img, 0, 0, canvas.width, canvas.height);
        attachments.push({
          type: 'image', url: canvas.toDataURL('image/jpeg', 0.8),
          name: file.name, added: new Date().toISOString().split('T')[0]
        });
        saveAttachments();
        renderPanel();
      };
      img.src = ev.target.result;
    };
    reader.readAsDataURL(file);
  };
  input.click();
}

function addLinkAttachment() {
  const url = prompt(t('linkPrompt'));
  if (!url) return;
  try {
    const domain = new URL(url).hostname;
    attachments.push({ type: 'link', url, title: domain, added: new Date().toISOString().split('T')[0] });
  } catch {
    attachments.push({ type: 'link', url, title: url, added: new Date().toISOString().split('T')[0] });
  }
  saveAttachments();
  renderPanel();
}

function addVideoAttachment() {
  const url = prompt(t('videoPrompt'));
  if (!url) return;
  attachments.push({ type: 'video', url, added: new Date().toISOString().split('T')[0] });
  saveAttachments();
  renderPanel();
}

function removeAttachment(index) {
  attachments.splice(index, 1);
  saveAttachments();
  renderPanel();
}

function saveAttachments() {
  localStorage.setItem('editorAttachments', JSON.stringify(attachments));
}

function getVideoEmbed(url) {
  // YouTube
  let m = url.match(/(?:youtube\.com\/watch\?v=|youtu\.be\/)([a-zA-Z0-9_-]+)/);
  if (m) return `https://www.youtube.com/embed/${m[1]}`;
  // Loom
  m = url.match(/loom\.com\/share\/([a-zA-Z0-9]+)/);
  if (m) return `https://www.loom.com/embed/${m[1]}`;
  return null;
}

function getFrame() { return document.getElementById('previewFrame'); }
function getFrameDoc() {
  try { return getFrame().contentDocument || getFrame().contentWindow.document; }
  catch(e) { return null; }

// ===================================================================
// UPDATE FUNCTIONS
// ===================================================================
function updateColor(varName, original, value) {
  pushUndo();
  changes[varName] = value;
  const doc = getFrameDoc();
  if (doc) doc.documentElement.style.setProperty(varName, value);
  updateStatus();
  renderPanel();
}

function updateProp(varName, original, value, sliderEl) {
  pushUndo();
  changes[varName] = value;
  applyPropToFrame(varName, value);
  updateStatus();
  if (sliderEl) {
    const valSpan = sliderEl.parentElement.querySelector('.token-slider-val');
    const def = findDef(varName);
    if (valSpan && def) valSpan.textContent = value + (def.unit || '');
    const label = sliderEl.closest('.token-row').querySelector('.token-label');
    if (label && value != original) label.style.color = 'var(--ed-accent)';
  }
}

function updateSemColor(varName, original, value) {
  if (value === '__custom') {
    pushUndo();
    changes[varName] = '#888888';
    applyPropToFrame(varName, '#888888');
  } else {
    pushUndo();
    changes[varName] = value;
    // Resolve var() for the iframe
    const doc = getFrameDoc();
    if (doc) {
      const resolved = getComputedStyle(doc.documentElement).getPropertyValue(value.replace('var(','').replace(')','').trim());
      const def = findDef(varName);
      if (def && def.selector) {
        doc.querySelectorAll(def.selector).forEach(el => { el.style[def.prop] = value; });
      }
    }
  }
  updateStatus();
  renderPanel();
}

function updateToggle(varName, original) {
  pushUndo();
  const current = changes[varName] !== undefined ? changes[varName] : original;
  const newVal = (current === 'true' || current === true) ? 'false' : 'true';
  changes[varName] = newVal;

  // Special handling for Claudinho mobile visibility
  if (varName === '--claud-mobile') {
    const doc = getFrameDoc();
    if (doc) {
      const claudinho = doc.querySelector('.claudinho');
      if (claudinho) {
        if (newVal === 'false') {
          claudinho.setAttribute('data-hide-mobile', 'true');
          // Inject a style rule
          let styleEl = doc.getElementById('claud-mobile-style');
          if (!styleEl) {
            styleEl = doc.createElement('style');
            styleEl.id = 'claud-mobile-style';
            doc.head.appendChild(styleEl);
          }
          styleEl.textContent = '@media(max-width:860px){.claudinho[data-hide-mobile="true"]{display:none!important}}';
        } else {
          claudinho.removeAttribute('data-hide-mobile');
          const styleEl = doc.getElementById('claud-mobile-style');
          if (styleEl) styleEl.remove();
        }
      }
    }
  }
  updateStatus();
  renderPanel();
}

function findDef(varName) {
  for (const tab of ['tipografia','espacamento','componentes']) {
    for (const group of Object.values(TOKENS[tab])) {
      if (group[varName]) return group[varName];
    }
  }
  return null;
}

function applyPropToFrame(varName, value) {
  const doc = getFrameDoc();
  if (!doc) return;
  const def = findDef(varName);
  if (!def || !def.selector) return;

  const unit = def.unit || '';
  const elements = doc.querySelectorAll(def.selector);
  elements.forEach(el => {
    if (def.type === 'font') el.style.fontFamily = value;
    else if (def.transform) el.style[def.prop] = def.transform(value);
    else el.style[def.prop] = value + unit;
    if (def.mirror) el.style[def.mirror] = value + unit;
  });

  if (def.also) {
    def.also.forEach(a => {
      doc.querySelectorAll(a.sel).forEach(el => {
        el.style[a.prop] = a.calc ? a.calc.replace('{v}', value) : value + unit;
      });
    });
  }
}

  currentTheme = theme;
  const doc = getFrameDoc();
  if (doc) {
    if (theme === 'dark') doc.documentElement.setAttribute('data-theme','dark');
    else doc.documentElement.removeAttribute('data-theme');
  }
  document.getElementById('btnLight').classList.toggle('active', theme==='light');
  document.getElementById('btnDark').classList.toggle('active', theme==='dark');

  reapplyAll();
  renderPanel();

  document.getElementById('sizeLabel').textContent = mode === 'mobile' ? '390px' : '100%';
  updateStatusLabel();

// ===================================================================
// WIREFRAME
// ===================================================================
function toggleWireframe() {
  wireframeOn = !wireframeOn;
  document.getElementById('btnWireframe').classList.toggle('wire-active', wireframeOn);
  applyWireframe();
}
function applyWireframe() {
  const doc = getFrameDoc();
  if (!doc) return;
  doc.querySelectorAll('.wf-outline, .wf-label').forEach(el => el.remove());
  const existingStyle = doc.getElementById('wireframe-style');
  if (existingStyle) existingStyle.remove();
  if (!wireframeOn) return;
  const style = doc.createElement('style');
  style.id = 'wireframe-style';
  style.textContent = `.wf-outline{outline:1px dashed rgba(99,140,210,0.5)!important;position:relative!important}.wf-label{position:absolute;font-family:'JetBrains Mono',monospace;font-size:9px;font-weight:500;color:#fff;background:rgba(99,140,210,0.85);padding:1px 5px;border-radius:2px;pointer-events:none;z-index:9999;line-height:1.4;white-space:nowrap;top:0;left:0}`;
  doc.head.appendChild(style);
  WIREFRAME_MAP.forEach(item => {
    const els = doc.querySelectorAll(item.sel);
    els.forEach((el, i) => {
      if (i > 2) return;
      el.classList.add('wf-outline');
      const label = doc.createElement('span');
      label.className = 'wf-label';
      label.textContent = item.name + ` ${Math.round(el.offsetWidth)}x${Math.round(el.offsetHeight)}`;
      el.style.position = el.style.position || 'relative';
      el.appendChild(label);
    });
  });
}

// ===================================================================
// SNAPSHOT
// ===================================================================
function takeSnapshot() {
  const timestamp = new Date().toISOString().replace(/[:.]/g, '-').slice(0, 19);
  let summary = `SNAPSHOT: ${timestamp}\n`;
  summary += `Theme: ${currentTheme} | Viewport: ${currentViewport}\n`;
  summary += `Page: ${document.getElementById('pageSelect').value}\n`;
  summary += `Changes (${Object.keys(changes).length}):\n`;
  for (const [k, v] of Object.entries(changes)) summary += `  ${k}: ${v}\n`;
  navigator.clipboard.writeText(summary).then(() => showToast(t('snapshotCopied')));
  try { getFrame().contentWindow.print(); } catch(e) {}
}

// ===================================================================
// NOTES
// ===================================================================
function saveNotes(val) { notes = val; localStorage.setItem('tokenEditorNotes', val); }
function copyNotes() {
  const field = document.getElementById('notesField');
  if (!field) return;
  let text = field.value;
  const log = generateChangeLog();
  if (log) text += '\n\n--- Alterações feitas ---\n' + log;
  navigator.clipboard.writeText(text).then(() => showToast(t('notesCopied')));
}
function clearNotes() { notes = ''; localStorage.removeItem('tokenEditorNotes'); renderPanel(); }
function generateChangeLog() {
  if (Object.keys(changes).length === 0) return t('noChangesYet');
  return Object.entries(changes).map(([k,v]) => `${k}: ${v}`).join('\n');
}

// ===================================================================
// RESET & REFRESH
// ===================================================================
function resetAll() {
  pushUndo();
  changes = {};
  activePresetIndex = -1;
  const frame = getFrame();
  frame.src = frame.src;
  frame.onload = () => {
    if (currentTheme === 'dark') {
      const doc = getFrameDoc();
      if (doc) doc.documentElement.setAttribute('data-theme','dark');
    }
    if (wireframeOn) setTimeout(applyWireframe, 300);
  };
  updateStatus();
  renderPanel();
}

function refreshPreview() {
  const frame = getFrame();
  frame.src = frame.src;
  frame.onload = () => {
    reapplyAll();
    if (wireframeOn) setTimeout(applyWireframe, 300);
  };
}

function reapplyAll() {
  const doc = getFrameDoc();
  if (!doc) return;
  if (currentTheme === 'dark') doc.documentElement.setAttribute('data-theme','dark');
  else doc.documentElement.removeAttribute('data-theme');

  const colorKeys = new Set();
  for (const theme of ['light','dark']) {
    for (const grp of Object.values(TOKENS.cores[theme])) {
      for (const k of Object.keys(grp)) colorKeys.add(k);
    }
  }

  for (const [k, v] of Object.entries(changes)) {
    if (colorKeys.has(k)) {
      doc.documentElement.style.setProperty(k, v);
    } else if (k === '--claud-mobile') {
      // Re-apply Claudinho mobile toggle
      const claudinho = doc.querySelector('.claudinho');
      if (claudinho && v === 'false') {
        claudinho.setAttribute('data-hide-mobile', 'true');
        let styleEl = doc.getElementById('claud-mobile-style');
        if (!styleEl) { styleEl = doc.createElement('style'); styleEl.id = 'claud-mobile-style'; doc.head.appendChild(styleEl); }
        styleEl.textContent = '@media(max-width:860px){.claudinho[data-hide-mobile="true"]{display:none!important}}';
      }
    } else {
      applyPropToFrame(k, v);
    }
  }
}

function changePage() {
  const page = document.getElementById('pageSelect').value;
  const frame = getFrame();
  frame.src = page;
  frame.onload = () => {
    reapplyAll();
    if (wireframeOn) setTimeout(applyWireframe, 300);
  };
}

// ===================================================================
// SAVE TO SERVER
// ===================================================================
async function saveTokens() {
  const payload = { light: {}, dark: {} };

  const colorKeysLight = new Set();
  const colorKeysDark = new Set();
  for (const grp of Object.values(TOKENS.cores.light)) { for (const k of Object.keys(grp)) colorKeysLight.add(k); }
  for (const grp of Object.values(TOKENS.cores.dark)) { for (const k of Object.keys(grp)) colorKeysDark.add(k); }

  for (const [varName, value] of Object.entries(changes)) {
    if (varName.startsWith('--claud-') && !varName.startsWith('--claud-size') && !varName.startsWith('--claud-bottom') && !varName.startsWith('--claud-right')) continue;
    if (colorKeysLight.has(varName)) payload.light[varName] = value;
    if (colorKeysDark.has(varName)) payload.dark[varName] = value;
  }

  // Only send if there are color changes
  if (Object.keys(payload.light).length === 0 && Object.keys(payload.dark).length === 0) {
    showToast(t('noChanges'), false);
    return;
  }

  try {
    const res = await fetch('/save-tokens', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(payload)
    });
    if (res.ok) {
      showToast(t('saveSuccess'));
    } else {
      showToast(t('saveError'), true);
    }
  } catch(e) {
    showToast(t('saveError'), true);
  }
}

// ===================================================================
// UTILS
// ===================================================================
function toHex6(color) {
  if (!color || color.startsWith('rgba') || color.startsWith('var(')) return '#888888';
  if (color.length === 4) return '#' + color[1]+color[1] + color[2]+color[2] + color[3]+color[3];
  return color;
}

function updateStatus() {
  const count = Object.keys(changes).length;
  const badge = document.getElementById('changesBadge');
  badge.textContent = count;
  badge.classList.toggle('hidden', count === 0);
  document.getElementById('statusText').textContent =
    count === 0 ? t('noChanges') : t('tokensChanged', count);
}

function updateStatusLabel() {
  document.getElementById('statusTheme').textContent = `${currentTheme} · ${currentViewport}`;
}

function showToast(msg, isError) {
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.className = 'snapshot-toast show' + (isError ? ' error' : '');
  setTimeout(() => el.className = 'snapshot-toast', 2500);
}

// ===================================================================
// RENDER ALL (for lang toggle)
// ===================================================================
function renderAll() {
  document.getElementById('panelTitle').textContent = t('panelTitle');
  document.getElementById('panelSubtitle').textContent = t('panelSubtitle');
  document.getElementById('undoLabel').textContent = t('undo');
  document.getElementById('btnReset').textContent = t('reset');
  document.getElementById('overviewLabel').textContent = t('overview');
  document.getElementById('saveLabel').textContent = t('save');
  document.getElementById('btnLang').textContent = currentLang.toUpperCase();
  renderTabs();
  renderPanel();
  updateStatus();
}

// ===================================================================
// INIT
// ===================================================================
getFrame().onload = () => { renderPanel(); updateUndoBtn(); };
renderAll();
updateUndoBtn();
</script>
